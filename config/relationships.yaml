# relationships.yaml - 关系定义（关系驱动多 Agent 协作）
# ============================================
# 借鉴 SALLMA 目录化配置 + LangGraph Command 原语
# 修改这个文件即可改变 Agent 之间的协作关系，无需改任何 Python 代码。

# ============================================
# 调度策略：priority / first_match / round_robin
# 优先级：数字越小越优先
# ============================================
priority:
  researcher: 1
  analyst: 2
  writer: 3

# ============================================
# 终止条件：黑板满足什么条件算"已完成"
# 暂时保留接口，v2.0 完善
# ============================================
termination:
  - "facts.has('result::writer')"
